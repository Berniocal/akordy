<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Akordy – editor</title>
<style>
body {
    font-family: Arial;
    margin: 20px;
    background: #121212;
    color: #e0e0e0;
}
textarea {
    width: 100%;
    height: 220px;
    font-family: monospace;
    background: #1e1e1e;
    color: #ffffff;
    border: 1px solid #444;
    padding: 10px;
}
button {
    padding: 10px;
    margin-top: 10px;
    margin-right: 10px;
    background: #2c2c2c;
    color: #fff;
    border: 1px solid #555;
    cursor: pointer;
}
button:hover {
    background: #3a3a3a;
}
.output {
    white-space: pre-wrap;
    background: #1e1e1e;
    padding: 10px;
    border: 1px solid #444;
    outline: none;
}
.chord {
    color: #4fc3f7;
    font-weight: bold;
    cursor: pointer;
}
label {
    margin-left: 10px;
}
</style>
</head>
<body>

<h2>Akordy → editor</h2>

<textarea id="input" placeholder="Vlož text..."></textarea><br>

<button onclick="processText()">Zpracovat</button>
<button onclick="copyText()">Kopírovat</button>
<button onclick="transpose(1)">+1</button>
<button onclick="transpose(-1)">-1</button>
<button onclick="undo()">Zpět</button>

<label>
    <input type="checkbox" id="wrapToggle" checked>
    Automatické závorky
</label>

<h3>Výstup:</h3>
<div id="output" class="output" contenteditable="true"></div>

<script>

const NOTES = ["C","C#","D","D#","E","F","F#","G","G#","A","B","H"];

let history = [];

// ===== uložit stav =====
function saveState() {
    history.push(document.getElementById("output").innerHTML);
    if (history.length > 50) history.shift();
}

// ===== undo =====
function undo() {
    if (history.length === 0) return;
    let last = history.pop();
    document.getElementById("output").innerHTML = last;
}

// ===== parser =====
function processText() {

    let wrap = document.getElementById("wrapToggle").checked;
    let text = document.getElementById("input").value;

    let result = "";
    let i = 0;

    while (i < text.length) {

        // EXISTUJÍCÍ [akord] → vždy zachovat
        if (text[i] === "[") {
            let end = text.indexOf("]", i);
            if (end !== -1) {
                let chord = text.slice(i+1, end);
                result += makeChord(chord);
                i = end + 1;
                continue;
            }
        }

        // NOVÝ akord → jen pokud je zapnuto
        if (wrap && /[A-H]/.test(text[i])) {

            let chord = text[i];
            i++;

            if (text[i] === "#" || text[i] === "b") {
                chord += text[i];
                i++;
            }

            if (text[i] === "m") {
                chord += "m";
                i++;
            }

            if (text.slice(i, i+3) === "add") {
                let match = text.slice(i).match(/^add\d+/);
                if (match) {
                    chord += match[0];
                    i += match[0].length;
                }
            }

            else if (text.slice(i, i+3) === "sus") {
                let match = text.slice(i).match(/^sus\d*/);
                if (match) {
                    chord += match[0];
                    i += match[0].length;
                }
            }

            while (/[0-9]/.test(text[i])) {
                chord += text[i];
                i++;
            }

            if (text[i] === "/" && /[A-H]/.test(text[i+1])) {
                chord += "/";
                i++;
                chord += text[i];
                i++;
            }

            result += makeChord(chord);
            continue;
        }

        result += text[i];
        i++;
    }

    document.getElementById("output").innerHTML = result;
}

// ===== vytvoření =====
function makeChord(chord) {
    return `<span class="chord" onclick="cycleChord(this)">[${chord}]</span>`;
}

// ===== split =====
function splitChord(chord) {
    let match = chord.match(/^([A-H](#|b)?)(.*)$/);
    if (!match) return null;

    return {
        root: match[1],
        rest: match[3] || ""
    };
}

// ===== klikání =====
function cycleChord(el) {
    saveState();

    let text = el.innerText;

    let full = text.match(/^\[([^\]]+)\]$/);
    if (full) {
        let p = splitChord(full[1]);
        if (p && p.rest.length > 0) {
            el.innerText = `[${p.root}]${p.rest}`;
            return;
        }
    }

    let mid = text.match(/^\[([A-H](#|b)?)\](.*)$/);
    if (mid) {
        let root = mid[1];
        let rest = mid[3];

        if (root.length > 1) {
            el.innerText = `[${root[0]}]${root.slice(1)}${rest}`;
            return;
        }

        el.outerHTML = root + rest;
        return;
    }
}

// ===== transpozice (jen akordy) =====
function transpose(step) {
    saveState();

    let chords = document.querySelectorAll("#output .chord");

    chords.forEach(el => {
        let text = el.innerText;
        let match = text.match(/^\[([^\]]+)\]$/);
        if (!match) return;

        let newChord = transposeChord(match[1], step);
        el.innerText = `[${newChord}]`;
    });
}

// ===== transpozice =====
function transposeChord(chord, step) {

    let parsed = splitChord(chord);
    if (!parsed) return chord;

    let {root, rest} = parsed;

    root = root.replace("Db","C#")
               .replace("Eb","D#")
               .replace("Gb","F#")
               .replace("Ab","G#")
               .replace("Bb","A#");

    let index = NOTES.indexOf(root);
    if (index === -1) return chord;

    let newIndex = (index + step + NOTES.length) % NOTES.length;

    return NOTES[newIndex] + rest;
}

// ===== copy =====
function copyText() {
    let text = document.getElementById("output").innerText;
    navigator.clipboard.writeText(text);
}

</script>

</body>
</html>
